# TaskFlow Configuration
# All skills must read this file to comply with system parameters

system:
  name: "TaskFlow"
  version: "1.0.0"
  projectRoot: "."
  taskDir: ".tasks"

heartbeat:
  intervalSeconds: 60
  jitterSeconds: 5
  staleThresholdSeconds: 120
  lockReleaserIntervalSeconds: 60

lock:
  acquireMode: "create-exclusive"
  releaseMode: "delete-file"

test:
  passRatioRequired: 1.0
  maxRetriesPerFlow: 3
  infraLockRequired: true
  skipPassedFlows: true
  warnNoBrowserMCP: true
  maxBounces: 3

browserMCP:
  - name: "playwriter"
    available: false
    lastCheck: null
    description: "Playwriter MCP — browser automation tool"
    # Note: The agent must have this MCP tool connected already.
    # This config only declares which connected MCP tools can be used for UI tests.

infrastructure:
  defaultEnvironment: "dev"
  environments: {}
  seed: []

runLog:
  enabled: true
  maxTaskLogLines: 500
  maxSessionLogLines: 500
  maxSessionFiles: 50
  maxReleaserLogLines: 100

executor:
  maxPickupAttempts: 5
  pickupRetryDelaySeconds: 30
  customInstructions: |
    ## Supplementary instructions for the Executor Agent
    - Use the brainstorming skill to clarify requirements before implementing
    - Reference docs/design before writing code
    - Run npm run lint -- --fix after implementation
    (Edit this section to match your needs)
  customSkills:
    - name: "requirement-analysis"
      path: ".agents/skills/requirement-analysis/SKILL.md"
      description: "Skill for analyzing requirements before implementation"
  customTools: []

tester:
  infraLockRequired: true
  warnNoBrowserMCP: true
  skipPassedFlows: true
  customInstructions: |
    ## Supplementary instructions for the Tester Agent
    - Check logs in core-api/logs/ before asserting
    - If a UI test fails, take a screenshot and attach it to the bug report
    (Edit this section to match your needs)
  customSkills:
    - name: "log-analysis"
      path: ".agents/skills/log-analysis/SKILL.md"
      description: "Skill for analyzing logs to debug test failures"
  customTools: []

user:
  allowMoveFromStates: ["defined", "pending", "blocked"]
  requireVersioningForActive: true

notification:
  enabled: true
  description: |
    Configure notification channels to alert users when tasks are blocked.
    The notifier agent reads this config and sends alerts through all enabled channels.
    Every channel MUST have a "guide" field with natural language instructions on how to connect and use it.

    ─────────────────────────────────────────────────────────────────────
    ACTIVE CHANNELS:
    - Only channels with `enabled: true` are active. The notifier agent skips disabled channels.
    - Set `enabled: false` on channels you don't need — don't delete them, so you can re-enable later.

    MULTIPLE INSTANCES:
    - One type (e.g. webhook) can have multiple instances — use the `name` field to distinguish them.
    - Example: 2 webhook instances — one for Slack (name: "slack-alerts"), one for Discord (name: "discord-alerts").
    - The `name` field is optional but strongly recommended when you have more than one instance of the same type.

    TESTING:
    - During `taskflow init` (Step 3.5), or via the user skill command `test notif`,
      the agent sends a test message through each active channel and asks you to confirm receipt.
    - Failed channels should be fixed (per their `guide`) or disabled (`enabled: false`).
    ─────────────────────────────────────────────────────────────────────
  channels:
    # ── Console (default, always works) ──────────────────────────────
    - name: "console-default"
      type: "console"
      enabled: true
      guide: |
        No setup needed. Notifications are printed to the terminal when the notifier agent runs.
        This channel is always available.
      description: "Output to terminal — always available, no setup needed"

    # ── File log (default, always works) ─────────────────────────────
    - name: "file-default"
      type: "file"
      enabled: true
      path: ".tasks/notifications.log"
      guide: |
        No setup needed. Notifications are appended to the file specified in "path".
        Check this file periodically or use a log viewer. The file is markdown-formatted for readability.
      description: "Append notifications to a markdown log file"

    # ── Webhook (disabled by default) ────────────────────────────────
    # To add a 2nd webhook instance, copy this block and change `name` + `url` + `format`.
    # Example:
    #   - name: "slack-alerts"
    #     type: "webhook"
    #     enabled: true
    #     url: "https://hooks.slack.com/services/..."
    #     format: "slack"
    #     guide: "..."
    #   - name: "discord-alerts"
    #     type: "webhook"
    #     enabled: true
    #     url: "https://discord.com/api/webhooks/..."
    #     format: "discord"
    #     guide: "..."
    - name: "webhook-default"
      type: "webhook"
      enabled: false
      url: ""
      method: "POST"
      format: "slack"
      guide: |
        To set up a webhook notification channel:

        1. Slack:
           - Go to https://api.slack.com/messaging/webhooks
           - Create a new app or select an existing one
           - Add an Incoming Webhook to a channel
           - Copy the webhook URL (looks like https://hooks.slack.com/services/...)
           - Paste it into the "url" field below
           - Set "format" to "slack"

        2. Discord:
           - Open Discord server settings > Integrations > Webhooks
           - Click "New Webhook" and select a channel
           - Copy the webhook URL
           - Paste it into "url" and set "format" to "discord"

        3. Microsoft Teams:
           - Open the channel > Connectors > Incoming Webhook
           - Name it and copy the URL
           - Paste into "url" and set "format" to "teams"

        4. Generic HTTP endpoint:
           - Any service that accepts HTTP POST with JSON body
           - Set "format" to "generic"
      description: "Send HTTP POST to a webhook URL (Slack, Discord, Teams)"

    # ── Email via SMTP (disabled by default) ─────────────────────────
    - name: "email-default"
      type: "email"
      enabled: false
      smtpHost: ""
      smtpPort: 587
      smtpUser: ""
      smtpPassword: ""
      from: ""
      to: ""
      guide: |
        To set up email notifications via SMTP:

        1. Gmail:
           - Enable 2-factor authentication on your Google account
           - Go to https://myaccount.google.com/apppasswords
           - Generate an App Password (16 characters)
           - Set smtpHost: "smtp.gmail.com", smtpPort: 587
           - Set smtpUser: your Gmail address
           - Set smtpPassword: the App Password (NOT your real password)
           - Set from: your Gmail address, to: recipient address

        2. Outlook/Office365:
           - Set smtpHost: "smtp.office365.com", smtpPort: 587
           - Use your Office365 credentials

        3. Amazon SES:
           - Set smtpHost: your SES endpoint
           - Set smtpPort: 587
           - Use your SES SMTP credentials

        4. Any SMTP server:
           - Set smtpHost and smtpPort to your server
           - Set smtpUser and smtpPassword to your credentials
      description: "Send email via SMTP"

    # ── Custom channel (disabled by default) ────────────────────────
    - name: "custom-default"
      type: "custom"
      enabled: false
      guide: |
        Describe how to send notifications using this channel. The notifier agent will
        read your instructions and execute them.

        Examples:
        - Telegram: "Send a message via Telegram bot API. Use curl to POST to
          https://api.telegram.org/bot<TOKEN>/sendMessage with chat_id=<CHAT_ID> and
          text=<message>. Replace <TOKEN> with your bot token from @BotFather."
        - SMS via Twilio: "Use the Twilio API to send an SMS. Set ACCOUNT_SID and
          AUTH_TOKEN as environment variables. POST to Twilio Messages API."
        - Desktop notification: "Use PowerShell to show a Windows notification."
        - Any custom method: Describe the exact steps and commands.
      description: "Custom channel — describe how to send notifications"

  blockedCheckIntervalSeconds: 60
  messageTemplate: |
    ## Blocked: {{taskName}} ({{taskId}})

    **Was in:** {{previousState}} | **By:** {{agentType}} | **At:** {{timestamp}}
    **Description:** {{taskDescription}}

    ### Questions ({{questionCount}})
    {{questionsGrouped}}

    ### Recent activity
    {{recentRunSummary}}

    **Resolve:** `npx taskflow resolve-blocked {{taskId}}`

# ─────────────────────────────────────────────────────────────────────
# Git Flow (optional — disabled by default)
# Enable to use worktree-based isolation for executor agents.
# When enabled:
#   - Executor creates a worktree from baseBranch, implements, commits,
#     and merges back into baseBranch BEFORE moving task to testing.
#   - Tester tests on baseBranch (which has the merged code).
#   - If tests fail, executor reverts the merge, fixes in worktree, re-merges.
#   - On approve, worktree is cleaned up (if autoCleanup is true).
# When disabled, executor works directly in the current working tree.
# ─────────────────────────────────────────────────────────────────────

# gitFlow:
#   enabled: false                    # Set to true to opt-in
#   baseBranch: "main"                # The branch tester tests on
#   worktreeDir: ".worktrees"         # Directory for worktrees (relative to project root)
#   branchPrefix: "taskflow/"         # Prefix for feature branches
#   autoCleanup: true                 # Remove worktree after task is done
#   commitConvention: "conventional"  # "conventional" (feat:/fix:/refactor:) or "plain"
#   mergeStrategy: "merge"            # "merge" | "rebase" | "squash"